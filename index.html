<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#6d1818" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="학생찾기" />
<title>학생 찾기</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
html, body { margin: 0; padding: 0; background: #faf7f4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
.pt-safe { padding-top: calc(env(safe-area-inset-top) + 12px); }
.pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 12px); }
input, select, button { font-size: 16px !important; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 20px; height: 20px; border: 2px solid #e7e5e4; border-top-color: #6d1818; border-radius: 50%; animation: spin 0.6s linear infinite; }
.spinner-sm { width: 14px; height: 14px; border: 2px solid #e7e5e4; border-top-color: #6d1818; border-radius: 50%; animation: spin 0.6s linear infinite; }
.burgundy-gradient { background: linear-gradient(135deg, #6d1818 0%, #991b1b 100%); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzgSO9kkIeM71XVBmdrPJe5AeJaUAjtGUAIwcxljXPyR65w7oxprKjQs0zM4KTqOcuz/exec';
const PW_KEY = 'student_finder_pw';

const CLASS_COUNT = { '1': 5, '2': 5, '3': 6 };
const GRADE_COLORS = {
  '1': 'linear-gradient(135deg, #fbbf24 0%, #d97706 100%)',
  '2': 'linear-gradient(135deg, #fb923c 0%, #c2410c 100%)',
  '3': 'linear-gradient(135deg, #f87171 0%, #b91c1c 100%)',
};

const AVATAR_GRADIENTS = [
  'linear-gradient(135deg, #fbbf24 0%, #d97706 100%)',
  'linear-gradient(135deg, #fb7185 0%, #be123c 100%)',
  'linear-gradient(135deg, #a78bfa 0%, #6d28d9 100%)',
  'linear-gradient(135deg, #34d399 0%, #047857 100%)',
  'linear-gradient(135deg, #38bdf8 0%, #0369a1 100%)',
  'linear-gradient(135deg, #f472b6 0%, #be185d 100%)',
  'linear-gradient(135deg, #fb923c 0%, #c2410c 100%)',
  'linear-gradient(135deg, #818cf8 0%, #4338ca 100%)',
];
function getAvatarGradient(key) {
  let hash = 0;
  for (let i = 0; i < key.length; i++) hash = (hash * 31 + key.charCodeAt(i)) | 0;
  return AVATAR_GRADIENTS[Math.abs(hash) % AVATAR_GRADIENTS.length];
}

async function callApi(action, password, params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('action', action);
  url.searchParams.set('password', password);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { method: 'GET' });
  return await res.json();
}

function LoginScreen({ onLogin }) {
  const [pw, setPw] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  
  const handleLogin = async () => {
    if (!pw.trim()) return;
    setLoading(true);
    setError('');
    try {
      const result = await callApi('login', pw);
      if (result.success) {
        localStorage.setItem(PW_KEY, pw);
        onLogin(pw);
      } else setError(result.error || '로그인 실패');
    } catch {
      setError('서버 연결 실패. 인터넷을 확인하세요.');
    } finally { setLoading(false); }
  };
  
  return (
    <div className="min-h-screen flex flex-col items-center justify-center px-6" style={{background: '#faf7f4'}}>
      <div className="w-full max-w-sm">
        <div className="text-center mb-8">
          <div className="w-16 h-16 burgundy-gradient rounded-2xl flex items-center justify-center mx-auto mb-4">
            <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 14l9-5-9-5-9 5 9 5z M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" /></svg>
          </div>
          <h1 className="text-2xl font-medium" style={{color: '#1c1917'}}>학생 찾기</h1>
          <p className="text-sm mt-2" style={{color: '#78716c'}}>비밀번호를 입력하세요</p>
        </div>
        <input type="password" value={pw} onChange={(e) => setPw(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleLogin()} placeholder="비밀번호" className="w-full px-4 py-3.5 text-base bg-white border rounded-2xl focus:outline-none" style={{borderColor: '#e7e5e4'}} autoFocus />
        {error && <p className="text-sm text-red-600 mt-2">{error}</p>}
        <button onClick={handleLogin} disabled={loading || !pw.trim()} className="w-full mt-4 py-3.5 text-white rounded-2xl font-medium disabled:opacity-40 active:opacity-90 burgundy-gradient">
          {loading ? '확인 중...' : '로그인'}
        </button>
      </div>
    </div>
  );
}

function StudentPhoto({ student, password, className, fallbackClass, showInitial }) {
  const [photoUrl, setPhotoUrl] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(false);
  
  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoading(true);
      setError(false);
      try {
        const result = await callApi('getPhoto', password, { studentKey: student.studentKey });
        if (cancelled) return;
        if (result.success && result.photoUrl) setPhotoUrl(result.photoUrl);
        else setError(true);
      } catch { if (!cancelled) setError(true); }
      finally { if (!cancelled) setLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [student.studentKey, password]);
  
  if (loading && showInitial) {
    return <div className={fallbackClass} style={{background: getAvatarGradient(student.studentKey)}}><span className="text-white font-medium" style={{fontSize: '1.5em'}}>{student.name.charAt(0)}</span></div>;
  }
  if (loading) return <div className={fallbackClass}><div className="spinner-sm" /></div>;
  if (error || !photoUrl) {
    if (showInitial) {
      return <div className={fallbackClass} style={{background: getAvatarGradient(student.studentKey)}}><span className="text-white font-medium" style={{fontSize: '1.5em'}}>{student.name.charAt(0)}</span></div>;
    }
    return <div className={fallbackClass}><svg className="w-1/3 h-1/3 text-stone-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></div>;
  }
  return <img src={photoUrl} alt={student.name} className={className} style={{objectPosition: 'center top'}} onError={() => setError(true)} referrerPolicy="no-referrer" />;
}

// 학적 상태 배지/메뉴 (이름 옆에 작게)
function StatusBadge({ status, onChange, loading }) {
  const [open, setOpen] = useState(false);
  
  const styles = {
    '재학': { bg: open ? '#6d1818' : '#dcfce7', color: open ? 'white' : '#15803d', border: open ? '#6d1818' : '#86efac', dot: '#15803d' },
    '전학': { bg: open ? '#6d1818' : '#fef3c7', color: open ? 'white' : '#b45309', border: open ? '#6d1818' : '#fde68a', dot: '#b45309' },
    '자퇴': { bg: open ? '#6d1818' : '#fee2e2', color: open ? 'white' : '#dc2626', border: open ? '#6d1818' : '#fecaca', dot: '#dc2626' },
  };
  const s = styles[status] || styles['재학'];
  
  const handleSelect = async (newStatus) => {
    setOpen(false);
    if (newStatus !== status) {
      await onChange(newStatus);
    }
  };
  
  return (
    <div className="relative">
      <button onClick={() => setOpen(!open)} className="px-2.5 py-1 rounded-full text-[11px] font-medium flex items-center gap-1.5 transition-colors" style={{background: s.bg, color: s.color, border: `0.5px solid ${s.border}`}}>
        {loading ? (
          <div className="w-3 h-3 rounded-full border-2 border-current border-t-transparent animate-spin" />
        ) : (
          <span className="w-1.5 h-1.5 rounded-full" style={{background: open ? 'white' : s.dot}} />
        )}
        {status}
        <svg className={`w-3 h-3 transition-transform ${open ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" /></svg>
      </button>
      {open && (
        <div className="absolute right-0 top-full mt-1.5 bg-white rounded-xl shadow-lg z-10 overflow-hidden" style={{border: '0.5px solid #e7e5e4', minWidth: '110px'}}>
          {['재학', '전학', '자퇴'].map((opt) => (
            <button key={opt} onClick={() => handleSelect(opt)} className="w-full px-3 py-2 text-left text-sm flex items-center gap-2 hover:bg-stone-50" style={{color: status === opt ? '#6d1818' : '#1c1917', fontWeight: status === opt ? 500 : 400, background: status === opt ? '#fef2f2' : 'white'}}>
              <span className="w-1.5 h-1.5 rounded-full" style={{background: styles[opt].dot}} />
              {opt}
              {status === opt && <svg className="w-3.5 h-3.5 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7" /></svg>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function StudentCard({ student, password, onStatusChanged }) {
  const [status, setStatus] = useState(student.status || '재학');
  const [updating, setUpdating] = useState(false);
  const [grades, setGrades] = useState(null);
  const [gradesLoading, setGradesLoading] = useState(true);
  const [showDetail, setShowDetail] = useState(false);
  
  useEffect(() => {
    let cancelled = false;
    (async () => {
      setGradesLoading(true);
      try {
        const result = await callApi('getGrades', password, { studentKey: student.studentKey });
        if (cancelled) return;
        if (result.success && result.grades) setGrades(result.grades);
      } catch {} 
      finally { if (!cancelled) setGradesLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [student.studentKey, password]);
  
  const formatPhone = (phone) => phone ? phone.replace(/-/g, '') : '';
  const getMapUrl = (address) => address ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}` : '#';
  
  const handleStatusChange = async (newStatus) => {
    setUpdating(true);
    try {
      const result = await callApi('updateStatus', password, { studentKey: student.studentKey, status: newStatus });
      if (result.success) {
        setStatus(newStatus);
        if (onStatusChanged) onStatusChanged(newStatus);
      } else {
        alert('학적 변경 실패: ' + (result.error || '알 수 없는 오류'));
      }
    } catch {
      alert('서버 연결 실패');
    } finally { setUpdating(false); }
  };
  
  return (
    <div className="bg-white rounded-2xl overflow-hidden" style={{border: '0.5px solid #e7e5e4'}}>
      <div className="aspect-[3/4] flex items-center justify-center relative" style={{background: '#f5f5f4'}}>
        <StudentPhoto student={student} password={password} className="w-full h-full object-cover" fallbackClass="w-full h-full flex items-center justify-center" showInitial={true} />
      </div>
      <div className="p-4">
        <div className="flex items-center gap-2 mb-1">
          <h2 className="text-xl font-medium" style={{color: '#1c1917'}}>{student.name}</h2>
          <span className="text-sm" style={{color: '#78716c'}}>{student.grade}학년 {student.classNum}반 {student.number}번</span>
          <div className="ml-auto">
            <StatusBadge status={status} onChange={handleStatusChange} loading={updating} />
          </div>
        </div>
        {grades && grades['출신중'] && (
          <p className="text-xs mb-3 flex items-center gap-1" style={{color: '#78716c'}}>
            <span>🎓</span>{grades['출신중']}
          </p>
        )}
        {!grades && <div className="mb-3" />}
        <div className="space-y-2">
          <a href={`tel:${formatPhone(student.studentPhone)}`} className="flex items-center justify-between p-3 rounded-xl active:opacity-70" style={{background: '#fafaf9'}}>
            <div className="flex items-center gap-3 min-w-0">
              <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style={{background: '#dbeafe'}}>
                <svg className="w-4 h-4" style={{color: '#1d4ed8'}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
              </div>
              <div className="min-w-0">
                <p className="text-xs" style={{color: '#a8a29e'}}>학생</p>
                <p className="text-base font-medium" style={{color: '#1c1917'}}>{student.studentPhone}</p>
              </div>
            </div>
            <svg className="w-5 h-5 flex-shrink-0" style={{color: '#d6d3d1'}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
          </a>
          <a href={`tel:${formatPhone(student.parentPhone)}`} className="flex items-center justify-between p-3 rounded-xl active:opacity-70" style={{background: '#fafaf9'}}>
            <div className="flex items-center gap-3 min-w-0">
              <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style={{background: '#fef3c7'}}>
                <svg className="w-4 h-4" style={{color: '#b45309'}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
              </div>
              <div className="min-w-0">
                <p className="text-xs" style={{color: '#a8a29e'}}>학부모</p>
                <p className="text-base font-medium" style={{color: '#1c1917'}}>{student.parentPhone}</p>
              </div>
            </div>
            <svg className="w-5 h-5 flex-shrink-0" style={{color: '#d6d3d1'}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
          </a>
          {student.address && (
            <a href={getMapUrl(student.address)} target="_blank" rel="noopener noreferrer" className="flex items-center justify-between p-3 rounded-xl active:opacity-70" style={{background: '#fafaf9'}}>
              <div className="flex items-start gap-3 min-w-0">
                <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style={{background: '#dcfce7'}}>
                  <svg className="w-4 h-4" style={{color: '#15803d'}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                </div>
                <div className="min-w-0 flex-1">
                  <p className="text-xs" style={{color: '#a8a29e'}}>주소 (탭하면 길찾기)</p>
                  <p className="text-sm break-keep leading-snug" style={{color: '#1c1917'}}>{student.address}</p>
                </div>
              </div>
              <svg className="w-4 h-4 flex-shrink-0 ml-2 mt-1" style={{color: '#d6d3d1'}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
            </a>
          )}
        </div>
        
        <GradesSection student={student} grades={grades} loading={gradesLoading} showDetail={showDetail} setShowDetail={setShowDetail} />
      </div>
    </div>
  );
}

function GradesSection({ student, grades, loading, showDetail, setShowDetail }) {
  if (loading) {
    return (
      <div className="mt-3 flex justify-center py-4">
        <div className="spinner-sm" />
      </div>
    );
  }
  if (!grades) return null;
  
  const grade = String(student.grade);
  
  // 1학년: 중학교 성적
  if (grade === '1') {
    if (!grades['중학교성적']) return null;
    return (
      <div className="mt-3 rounded-2xl p-4" style={{background: 'linear-gradient(135deg, #fef3c7 0%, #fde68a 100%)', border: '0.5px solid #fcd34d'}}>
        <div className="flex items-center gap-1.5 mb-2">
          <svg className="w-4 h-4" style={{color: '#b45309'}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 14l9-5-9-5-9 5 9 5z" /></svg>
          <p className="text-xs font-medium" style={{color: '#92400e'}}>중학교 성적</p>
        </div>
        <p className="text-3xl font-medium text-center tracking-wide" style={{color: '#78350f'}}>{grades['중학교성적']}</p>
      </div>
    );
  }
  
  // 2학년: 1학년 내신 (5등급/9등급)
  if (grade === '2') {
    return <GradeBlock title="1학년 내신" colorScheme="purple" grades={grades} hasFiveGrade={true} showDetail={showDetail} setShowDetail={setShowDetail} />;
  }
  
  // 3학년: 1학년 + 2학년 내신 (9등급만)
  if (grade === '3') {
    return (
      <>
        <GradeBlock title="1학년 내신" colorScheme="purple" grades={grades} hasFiveGrade={false} yearKey="1학년" showDetail={showDetail} setShowDetail={setShowDetail} />
        <GradeBlock title="2학년 내신" colorScheme="green" grades={grades} hasFiveGrade={false} yearKey="2학년" showDetail={showDetail} setShowDetail={setShowDetail} />
      </>
    );
  }
  
  return null;
}

function GradeBlock({ title, colorScheme, grades, hasFiveGrade, yearKey, showDetail, setShowDetail }) {
  const colors = {
    purple: { bg: 'linear-gradient(135deg, #f3e8ff 0%, #ede9fe 100%)', border: '#c4b5fd', text: '#5b21b6', sub: '#7c3aed', value: '#5b21b6' },
    green: { bg: 'linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%)', border: '#86efac', text: '#166534', sub: '#15803d', value: '#166534' },
  };
  const c = colors[colorScheme];
  
  // 과목 매핑: 2학년은 5등급+9등급, 3학년은 9등급만
  const getGrade = (subject) => {
    if (hasFiveGrade) {
      // 2학년 데이터
      const five = grades[`${subject}_5등급`];
      const nine = grades[`${subject}_9등급`];
      return { five, nine };
    } else {
      // 3학년 데이터 (1·2학년 부분은 기준교과만, 과목별은 현재 학년 데이터)
      if (yearKey === '1학년' && subject === '전교과') {
        return { nine: grades['기준_1학년_9등급'] };
      }
      if (yearKey === '2학년' && subject === '전교과') {
        return { nine: grades['기준_2학년_9등급'] };
      }
      // 2학년의 과목별 데이터는 3학년 파일에 1학년 기준만 있고 과목별은 없음
      // 따라서 1학년의 과목별 데이터를 그대로 사용
      if (yearKey === '1학년') {
        return { nine: grades[`${subject}_9등급`] };
      }
      // 2학년의 과목별 세부는 데이터 없음
      return { nine: null };
    }
  };
  
  const formatVal = (v) => {
    if (v === null || v === undefined || v === '' || v === '-') return '-';
    return v;
  };
  
  const mainSubjects = ['전교과', '국', '수', '영'];
  const detailSubjects = ['사', '과', '수과', '국수영', '국수영사', '국수영과', '국수영사과'];
  
  // 데이터 없는 경우 (3학년 카드의 2학년 과목별)
  const hasMainData = mainSubjects.some(s => {
    const g = getGrade(s);
    return g.nine && g.nine !== '-';
  });
  if (!hasMainData) return null;
  
  return (
    <div className="mt-3 rounded-2xl p-4" style={{background: c.bg, border: `0.5px solid ${c.border}`}}>
      <div className="flex items-center gap-1.5 mb-3">
        <svg className="w-4 h-4" style={{color: c.sub}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
        <p className="text-xs font-medium" style={{color: c.text}}>{title}</p>
      </div>
      
      <div className="grid grid-cols-4 gap-1.5">
        {mainSubjects.map(s => {
          const g = getGrade(s);
          return (
            <div key={s} className="bg-white rounded-lg py-2 px-1 text-center">
              <p className="text-[10px]" style={{color: '#6b7280'}}>{s === '전교과' ? '전교과' : s}</p>
              {hasFiveGrade ? (
                <>
                  <p className="text-sm font-medium mt-0.5" style={{color: c.value}}>{formatVal(g.five)}</p>
                  <p className="text-[10px]" style={{color: '#9ca3af'}}>{formatVal(g.nine)}</p>
                </>
              ) : (
                <p className="text-sm font-medium mt-0.5" style={{color: c.value}}>{formatVal(g.nine)}</p>
              )}
            </div>
          );
        })}
      </div>
      
      {hasFiveGrade && (
        <p className="text-[10px] text-center mt-2" style={{color: c.sub}}>큰 숫자: 5등급 · 작은 숫자: 9등급</p>
      )}
      
      <button onClick={() => setShowDetail(!showDetail)} className="w-full mt-3 py-2 bg-white rounded-lg text-xs font-medium flex items-center justify-center gap-1" style={{color: c.sub, border: `0.5px solid ${c.border}`}}>
        {showDetail ? '계열별 접기' : '계열별 자세히 보기'}
        <svg className={`w-3 h-3 transition-transform ${showDetail ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" /></svg>
      </button>
      
      {showDetail && (
        <div className="grid grid-cols-2 gap-1.5 mt-2">
          {detailSubjects.map(s => {
            const g = getGrade(s);
            if (!g.nine || g.nine === '-') return null;
            return (
              <div key={s} className="bg-white rounded-lg py-2 px-2 text-center">
                <p className="text-[10px]" style={{color: '#6b7280'}}>{s}</p>
                {hasFiveGrade ? (
                  <p className="text-sm font-medium mt-0.5" style={{color: c.value}}>{formatVal(g.five)} · {formatVal(g.nine)}</p>
                ) : (
                  <p className="text-sm font-medium mt-0.5" style={{color: c.value}}>{formatVal(g.nine)}</p>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function SearchTab({ password, onSelect }) {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [stats, setStats] = useState(null);
  const [expandedGrade, setExpandedGrade] = useState(null);
  const debounceRef = useRef(null);
  
  // 통계 로드
  useEffect(() => {
    (async () => {
      try {
        const result = await callApi('getStats', password);
        if (result.success) setStats(result.stats);
      } catch {}
    })();
  }, [password]);
  
  useEffect(() => {
    if (!query.trim()) { setResults([]); setError(''); return; }
    if (debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(async () => {
      setLoading(true);
      setError('');
      try {
        const result = await callApi('search', password, { query });
        if (result.success) setResults(result.results || []);
        else setError(result.error || '검색 실패');
      } catch { setError('서버 연결 실패'); }
      finally { setLoading(false); }
    }, 300);
    return () => clearTimeout(debounceRef.current);
  }, [query, password]);
  
  useEffect(() => {
    if (results.length === 1 && query.trim().length >= 2) onSelect(results[0]);
  }, [results]);
  
  return (
    <>
      <div className="relative mb-4">
        <svg className="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2" style={{color: '#a8a29e'}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
        <input type="text" value={query} onChange={(e) => setQuery(e.target.value)} placeholder="이름이나 학년-반-번호 (예: 김민서, 1-5)" className="w-full pl-11 pr-11 py-3.5 bg-white rounded-2xl focus:outline-none" style={{border: '0.5px solid #e7e5e4'}} autoFocus />
        {query && (
          <button onClick={() => setQuery('')} className="absolute right-4 top-1/2 -translate-y-1/2" style={{color: '#a8a29e'}}>
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
          </button>
        )}
      </div>
      
      {loading && <div className="flex justify-center py-8"><div className="spinner" /></div>}
      {!loading && error && <p className="text-center text-red-600 py-4">{error}</p>}
      {!loading && !error && query && results.length === 0 && (
        <p className="text-center py-8 text-sm" style={{color: '#a8a29e'}}>검색 결과가 없습니다</p>
      )}
      {!loading && !error && results.length > 0 && <ResultsList students={results} onSelect={onSelect} />}
      
      {/* 검색어 없을 때 학년별 통계 표시 */}
      {!query && stats && (
        <div>
          <div className="bg-white rounded-2xl overflow-hidden" style={{border: '0.5px solid #e7e5e4'}}>
            {['1', '2', '3'].map((grade, idx) => {
              const gradeData = stats.grades[grade];
              if (!gradeData) return null;
              const isExpanded = expandedGrade === grade;
              const classNums = Object.keys(gradeData.classes).sort((a, b) => Number(a) - Number(b));
              return (
                <div key={grade}>
                  <button onClick={() => setExpandedGrade(isExpanded ? null : grade)} className="w-full px-4 py-3.5 flex items-center justify-between active:bg-stone-50" style={idx > 0 ? {borderTop: '0.5px solid #e7e5e4'} : {}}>
                    <div className="flex items-center gap-3">
                      <div className="w-9 h-9 rounded-xl flex items-center justify-center text-white font-medium text-sm" style={{background: GRADE_COLORS[grade]}}>{grade}</div>
                      <div className="text-left">
                        <p className="text-sm font-medium" style={{color: '#1c1917'}}>{grade}학년 재학생</p>
                        <p className="text-[11px]" style={{color: '#a8a29e'}}>{classNums.length}개 반</p>
                      </div>
                    </div>
                    <div className="flex items-center gap-1.5">
                      <p className="text-lg font-medium" style={{color: '#6d1818'}}>{gradeData.total}</p>
                      <p className="text-xs" style={{color: '#78716c'}}>명</p>
                      <svg className={`w-3.5 h-3.5 ml-1 transition-transform ${isExpanded ? 'rotate-180' : ''}`} style={{color: '#a8a29e'}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
                    </div>
                  </button>
                  {isExpanded && (
                    <div className="px-4 pb-3 pt-1" style={{background: '#fafaf9'}}>
                      <div className="grid gap-1.5" style={{gridTemplateColumns: `repeat(${Math.min(classNums.length, 6)}, 1fr)`}}>
                        {classNums.map((cn) => {
                          const teacher = stats.homerooms && stats.homerooms[`${grade}-${cn}`];
                          return (
                            <div key={cn} className="text-center py-2 px-1 bg-white rounded-lg">
                              <p className="text-[10px]" style={{color: '#a8a29e'}}>{cn}반</p>
                              <p className="text-sm font-medium" style={{color: '#1c1917'}}>{gradeData.classes[cn]}</p>
                              {teacher && <p className="text-[9px] mt-0.5 truncate" style={{color: '#78716c'}}>{teacher}</p>}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <p className="text-[11px] text-center mt-3" style={{color: '#a8a29e'}}>
            전체 재학생 <span style={{color: '#1c1917', fontWeight: 500}}>{stats.totalEnrolled}명</span>
            {stats.totalNotEnrolled > 0 && (
              <> · 미재학 <span style={{color: '#a8a29e'}}>{stats.totalNotEnrolled}명</span></>
            )}
          </p>
        </div>
      )}
      
      {!query && !stats && (
        <div className="flex justify-center py-8"><div className="spinner-sm" /></div>
      )}
    </>
  );
}

function ClassDetailScreen({ password, grade, classNum, onBack, onSelectStudent }) {
  const [students, setStudents] = useState([]);
  const [homeroom, setHomeroom] = useState('');
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  
  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoading(true);
      setError('');
      try {
        const result = await callApi('searchClass', password, { grade, classNum });
        if (cancelled) return;
        if (result.success) {
          setStudents(result.results || []);
          setHomeroom(result.homeroom || '');
        }
        else setError(result.error || '조회 실패');
      } catch { if (!cancelled) setError('서버 연결 실패'); }
      finally { if (!cancelled) setLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [grade, classNum, password]);
  
  const enrolledCount = students.filter(s => !s.status || s.status === '재학').length;
  
  return (
    <div className="min-h-screen" style={{background: '#faf7f4'}}>
      <div className="pt-safe burgundy-gradient">
        <div className="px-5 pb-5">
          <div className="flex items-center gap-2 mb-3">
            <button onClick={onBack} className="w-9 h-9 rounded-xl flex items-center justify-center" style={{background: 'rgba(255,255,255,0.15)'}}>
              <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
            </button>
            <p className="text-sm" style={{color: 'rgba(255,255,255,0.75)'}}>반별 보기</p>
          </div>
          <div className="flex items-baseline justify-between">
            <div className="flex items-baseline gap-2">
              <h1 className="text-2xl font-medium text-white">{grade}학년 {classNum}반</h1>
              {homeroom && <span className="text-sm" style={{color: 'rgba(255,255,255,0.85)'}}>· {homeroom}</span>}
            </div>
            {!loading && (
              <p className="text-sm" style={{color: 'rgba(255,255,255,0.75)'}}>
                재학 {enrolledCount}명{students.length !== enrolledCount && ` / 전체 ${students.length}명`}
              </p>
            )}
          </div>
        </div>
      </div>
      <div className="px-4 py-4 pb-safe">
        {loading && (
          <div className="flex flex-col items-center justify-center py-16">
            <div className="spinner mb-3" />
            <p className="text-xs" style={{color: '#a8a29e'}}>학생 정보 불러오는 중...</p>

        {!loading && error && <p className="text-center text-red-600 py-4">{error}</p>}

          <p className="text-center py-12 text-sm" style={{color: '#a8a29e'}}>해당 반에 학생이 없습니다</p>
        )}
        {!loading && !error && students.length > 0 && (
          <ClassGrid students={students} onSelect={onSelectStudent} password={password} />
        )}

    </div>
  );

          <div className="flex items-center gap-2">
            <button onClick={onBack} className="w-9 h-9 rounded-xl flex items-center justify-center" style={{background: 'rgba(255,255,255,0.15)'}}>
              <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
            </button>
            <p className="text-sm text-white font-medium">학생 정보</p>
          </div>
        </div>
      </div>
      <div className="px-4 py-4 pb-safe">
        <StudentCard student={student} password={password} onStatusChanged={onStatusChanged} />
      </div>
    </div>
  );
}

function MainScreen({ password, onLogout }) {
  const [tab, setTab] = useState('search');
  const [view, setView] = useState('main');
  const [selectedClass, setSelectedClass] = useState(null);
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [previousView, setPreviousView] = useState('main');
  const [statsRefreshKey, setStatsRefreshKey] = useState(0);
  
  const handleLogoutClick = () => {
    if (confirm('로그아웃 하시겠어요?')) {
      localStorage.removeItem(PW_KEY);
      onLogout();
    }
  };
  
  const handleOpenClass = (grade, classNum) => {
    setSelectedClass({ grade, classNum });
    setView('classDetail');
  };
  
  const handleSelectStudent = (student) => {
    setPreviousView(view);
    setSelectedStudent(student);
    setView('studentDetail');
  };
  
  const handleBackFromStudent = () => {
    setView(previousView);
    setSelectedStudent(null);
  };
  
  const handleStatusChanged = (newStatus) => {
    // 메인 화면 통계 갱신용
    setStatsRefreshKey(k => k + 1);
    // selected 학생 상태도 업데이트
    if (selectedStudent) {
      setSelectedStudent({...selectedStudent, status: newStatus});
    }
  };
  
  if (view === 'studentDetail' && selectedStudent) {
    return <StudentDetailScreen student={selectedStudent} password={password} onBack={handleBackFromStudent} onStatusChanged={handleStatusChanged} />;
  }
  if (view === 'classDetail' && selectedClass) {
    return <ClassDetailScreen password={password} grade={selectedClass.grade} classNum={selectedClass.classNum} onBack={() => setView('main')} onSelectStudent={handleSelectStudent} />;
  }
  
  return (
    <div className="min-h-screen" style={{background: '#faf7f4'}}>
      <HomeHeader onLogout={handleLogoutClick} subtitle={tab === 'search' ? '이름 또는 학년-반-번호로 검색하세요' : '학년과 반을 선택해주세요'} />
      <div className="px-4 -mt-7 pb-safe relative">
        <TabBar tab={tab} setTab={setTab} />
        <div className="mt-4">
          {tab === 'search' ? (
            <SearchTab key={statsRefreshKey} password={password} onSelect={handleSelectStudent} />
          ) : (
            <ClassPickerTab password={password} onOpenClass={handleOpenClass} />
          )}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [password, setPassword] = useState(null);
  const [checking, setChecking] = useState(true);
  
  useEffect(() => {
    const saved = localStorage.getItem(PW_KEY);
    if (saved) {
      callApi('login', saved).then(result => {
        if (result.success) setPassword(saved);
        else localStorage.removeItem(PW_KEY);
        setChecking(false);
      }).catch(() => setChecking(false));
    } else setChecking(false);
  }, []);
  
  if (checking) return <div className="min-h-screen flex items-center justify-center" style={{background: '#faf7f4'}}><div className="spinner" /></div>;
  if (!password) return <LoginScreen onLogin={setPassword} />;
  return <MainScreen password={password} onLogout={() => setPassword(null)} />;
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
