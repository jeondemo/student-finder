<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="학생찾기" />
  <title>학생 찾기</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
    }
    .pt-safe { padding-top: calc(env(safe-area-inset-top) + 12px); }
    .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 12px); }
    input { font-size: 16px !important; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #e2e8f0;
      border-top-color: #0f172a;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzgSO9kkIeM71XVBmdrPJe5AeJaUAjtGUAIwcxljXPyR65w7oxprKjQs0zM4KTqOcuz/exec';
    
    const PW_KEY = 'student_finder_pw';
    const RECENT_KEY = 'student_finder_recent';
    
    async function callApi(action, password, params = {}) {
      const url = new URL(GAS_URL);
      url.searchParams.set('action', action);
      url.searchParams.set('password', password);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      
      const res = await fetch(url.toString(), { method: 'GET' });
      return await res.json();
    }
    
    function LoginScreen({ onLogin }) {
      const [pw, setPw] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      
      const handleLogin = async () => {
        if (!pw.trim()) return;
        setLoading(true);
        setError('');
        try {
          const result = await callApi('login', pw);
          if (result.success) {
            localStorage.setItem(PW_KEY, pw);
            onLogin(pw);
          } else {
            setError(result.error || '로그인 실패');
          }
        } catch (e) {
          setError('서버 연결 실패. 인터넷 확인하세요.');
        } finally {
          setLoading(false);
        }
      };
      
      return (
        <div className="min-h-screen flex flex-col items-center justify-center px-6 bg-slate-50">
          <div className="w-full max-w-sm">
            <div className="text-center mb-8">
              <div className="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
              </div>
              <h1 className="text-xl font-bold text-slate-900">학생 찾기</h1>
              <p className="text-sm text-slate-500 mt-1">비밀번호를 입력하세요</p>
            </div>
            
            <input
              type="password"
              value={pw}
              onChange={(e) => setPw(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && handleLogin()}
              placeholder="비밀번호"
              className="w-full px-4 py-3 text-base bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-900"
              autoFocus
            />
            
            {error && (
              <p className="text-sm text-red-600 mt-2">{error}</p>
            )}
            
            <button
              onClick={handleLogin}
              disabled={loading || !pw.trim()}
              className="w-full mt-4 py-3 bg-slate-900 text-white rounded-xl font-medium disabled:bg-slate-300 active:bg-slate-800"
            >
              {loading ? '확인 중...' : '로그인'}
            </button>
          </div>
        </div>
      );
    }
    
    function StudentCard({ student, password, onClose }) {
      const [photoUrl, setPhotoUrl] = useState(null);
      const [photoLoading, setPhotoLoading] = useState(true);
      const [photoError, setPhotoError] = useState(false);
      
      useEffect(() => {
        let cancelled = false;
        (async () => {
          setPhotoLoading(true);
          setPhotoError(false);
          try {
            const result = await callApi('getPhoto', password, { studentKey: student.studentKey });
            if (cancelled) return;
            if (result.success && result.photoUrl) {
              setPhotoUrl(result.photoUrl);
            } else {
              setPhotoError(true);
            }
          } catch {
            if (!cancelled) setPhotoError(true);
          } finally {
            if (!cancelled) setPhotoLoading(false);
          }
        })();
        return () => { cancelled = true; };
      }, [student.studentKey, password]);
      
      const formatPhone = (phone) => phone ? phone.replace(/-/g, '') : '';
      
      const getMapUrl = (address) => {
        if (!address) return '#';
        return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
      };
      
      return (
        <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
          <div className="aspect-[3/4] bg-slate-100 flex items-center justify-center relative">
            {photoLoading && <div className="spinner" />}
            {!photoLoading && photoError && (
              <div className="text-center text-slate-400">
                <svg className="w-12 h-12 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                <p className="text-sm">사진 없음</p>
              </div>
            )}
            {!photoLoading && !photoError && photoUrl && (
              <img
                src={photoUrl}
                alt={student.name}
                className="w-full h-full object-cover"
                onError={() => setPhotoError(true)}
                referrerPolicy="no-referrer"
              />
            )}
          </div>
          
          <div className="p-4">
            <div className="flex items-baseline gap-2 mb-3">
              <h2 className="text-xl font-bold text-slate-900">{student.name}</h2>
              <span className="text-sm text-slate-500">
                {student.grade}학년 {student.classNum}반 {student.number}번
              </span>
            </div>
            
            <div className="space-y-2">
              
                href={`tel:${formatPhone(student.studentPhone)}`}
                className="flex items-center justify-between p-3 bg-slate-50 rounded-xl active:bg-slate-100"
              >
                <div className="flex items-center gap-3 min-w-0">
                  <div className="w-9 h-9 bg-blue-100 rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg className="w-4 h-4 text-blue-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                  </div>
                  <div className="min-w-0">
                    <p className="text-xs text-slate-500">학생</p>
                    <p className="text-base font-medium text-slate-900">{student.studentPhone}</p>
                  </div>
                </div>
                <svg className="w-5 h-5 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                </svg>
              </a>
              
              
                href={`tel:${formatPhone(student.parentPhone)}`}
                className="flex items-center justify-between p-3 bg-slate-50 rounded-xl active:bg-slate-100"
              >
                <div className="flex items-center gap-3 min-w-0">
                  <div className="w-9 h-9 bg-amber-100 rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg className="w-4 h-4 text-amber-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                  </div>
                  <div className="min-w-0">
                    <p className="text-xs text-slate-500">학부모</p>
                    <p className="text-base font-medium text-slate-900">{student.parentPhone}</p>
                  </div>
                </div>
                <svg className="w-5 h-5 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                </svg>
              </a>
              
              
                href={`sms:${formatPhone(student.parentPhone)}`}
                className="flex items-center gap-3 p-3 bg-slate-50 rounded-xl active:bg-slate-100"
              >
                <div className="w-9 h-9 bg-purple-100 rounded-lg flex items-center justify-center flex-shrink-0">
                  <svg className="w-4 h-4 text-purple-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                  </svg>
                </div>
                <div>
                  <p className="text-xs text-slate-500">문자</p>
                  <p className="text-sm text-slate-700">학부모에게 문자 보내기</p>
                </div>
              </a>
              
              {student.address && (
                
                  href={getMapUrl(student.address)}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="flex items-center justify-between p-3 bg-slate-50 rounded-xl active:bg-slate-100"
                >
                  <div className="flex items-start gap-3 min-w-0">
                    <div className="w-9 h-9 bg-green-100 rounded-lg flex items-center justify-center flex-shrink-0">
                      <svg className="w-4 h-4 text-green-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                      </svg>
                    </div>
                    <div className="min-w-0 flex-1">
                      <p className="text-xs text-slate-500">주소 (탭하면 길찾기)</p>
                      <p className="text-sm text-slate-900 break-keep leading-snug">{student.address}</p>
                    </div>
                  </div>
                  <svg className="w-4 h-4 text-slate-400 flex-shrink-0 ml-2 mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                  </svg>
                </a>
              )}
            </div>
          </div>
        </div>
      );
    }
    
    function ResultsList({ students, onSelect }) {
      return (
        <div className="space-y-2">
          {students.map((s) => (
            <button
              key={s.studentKey}
              onClick={() => onSelect(s)}
              className="w-full flex items-center justify-between p-3 bg-white border border-slate-200 rounded-xl active:bg-slate-50 text-left"
            >
              <div>
                <p className="font-medium text-slate-900">{s.name}</p>
                <p className="text-xs text-slate-500 mt-0.5">
                  {s.grade}학년 {s.classNum}반 {s.number}번
                </p>
              </div>
              <svg className="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
              </svg>
            </button>
          ))}
        </div>
      );
    }
    
    function SearchScreen({ password, onLogout }) {
      const [query, setQuery] = useState('');
      const [results, setResults] = useState([]);
      const [selected, setSelected] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [recent, setRecent] = useState([]);
      const debounceRef = useRef(null);
      
      useEffect(() => {
        const saved = localStorage.getItem(RECENT_KEY);
        if (saved) {
          try { setRecent(JSON.parse(saved)); } catch {}
        }
      }, []);
      
      useEffect(() => {
        if (!query.trim()) {
          setResults([]);
          setError('');
          return;
        }
        
        if (debounceRef.current) clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(async () => {
          setLoading(true);
          setError('');
          try {
            const result = await callApi('search', password, { query });
            if (result.success) {
              setResults(result.results || []);
            } else {
              setError(result.error || '검색 실패');
            }
          } catch {
            setError('서버 연결 실패');
          } finally {
            setLoading(false);
          }
        }, 300);
        
        return () => clearTimeout(debounceRef.current);
      }, [query, password]);
      
      useEffect(() => {
        if (results.length === 1 && query.trim().length >= 2) {
          handleSelect(results[0]);
        }
      }, [results]);
      
      const handleSelect = (student) => {
        setSelected(student);
        const newRecent = [
          student,
          ...recent.filter(r => r.studentKey !== student.studentKey)
        ].slice(0, 8);
        setRecent(newRecent);
        localStorage.setItem(RECENT_KEY, JSON.stringify(newRecent));
      };
      
      const handleBack = () => setSelected(null);
      
      const handleClearRecent = () => {
        if (confirm('최근 검색 기록을 모두 지울까요?')) {
          setRecent([]);
          localStorage.removeItem(RECENT_KEY);
        }
      };
      
      const handleLogoutClick = () => {
        if (confirm('로그아웃 하시겠어요?')) {
          localStorage.removeItem(PW_KEY);
          onLogout();
        }
      };
      
      return (
        <div className="min-h-screen bg-slate-50">
          <div className="pt-safe bg-white border-b border-slate-200 sticky top-0 z-10">
            <div className="px-4 pb-3">
              <div className="flex items-center justify-between mb-3">
                <h1 className="text-lg font-bold text-slate-900">
                  {selected ? (
                    <button onClick={handleBack} className="flex items-center gap-1 text-slate-600">
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                      </svg>
                      뒤로
                    </button>
                  ) : '학생 찾기'}
                </h1>
                <button
                  onClick={handleLogoutClick}
                  className="text-xs text-slate-500 px-2 py-1"
                >
                  로그아웃
                </button>
              </div>
              
              {!selected && (
                <div className="relative">
                  <svg className="w-5 h-5 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                  </svg>
                  <input
                    type="text"
                    value={query}
                    onChange={(e) => setQuery(e.target.value)}
                    placeholder="이름 또는 학년-반-번호 (예: 김민서, 1-5)"
                    className="w-full pl-10 pr-10 py-2.5 bg-slate-100 border-0 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-900"
                    autoFocus
                  />
                  {query && (
                    <button
                      onClick={() => setQuery('')}
                      className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"
                    >
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                      </svg>
                    </button>
                  )}
                </div>
              )}
            </div>
          </div>
          
          <div className="px-4 py-4 pb-safe">
            {selected ? (
              <StudentCard student={selected} password={password} onClose={handleBack} />
            ) : (
              <>
                {loading && (
                  <div className="flex justify-center py-8">
                    <div className="spinner" />
                  </div>
                )}
                
                {!loading && error && (
                  <p className="text-center text-red-600 py-4">{error}</p>
                )}
                
                {!loading && !error && query && results.length === 0 && (
                  <p className="text-center text-slate-400 py-8 text-sm">
                    검색 결과가 없습니다
                  </p>
                )}
                
                {!loading && !error && results.length > 0 && (
                  <ResultsList students={results} onSelect={handleSelect} />
                )}
                
                {!query && recent.length > 0 && (
                  <div>
                    <div className="flex items-center justify-between mb-2">
                      <p className="text-xs text-slate-500 font-medium">최근 검색</p>
                      <button onClick={handleClearRecent} className="text-xs text-slate-400">
                        전체 삭제
                      </button>
                    </div>
                    <ResultsList students={recent} onSelect={handleSelect} />
                  </div>
                )}
                
                {!query && recent.length === 0 && (
                  <div className="text-center text-slate-400 py-12">
                    <svg className="w-12 h-12 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <p className="text-sm">학생 이름이나 학번을 입력하세요</p>
                    <p className="text-xs text-slate-300 mt-1">예: 김민서, 1-5, 1-1-5</p>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      );
    }
    
    function App() {
      const [password, setPassword] = useState(null);
      const [checking, setChecking] = useState(true);
      
      useEffect(() => {
        const saved = localStorage.getItem(PW_KEY);
        if (saved) {
          callApi('login', saved).then(result => {
            if (result.success) {
              setPassword(saved);
            } else {
              localStorage.removeItem(PW_KEY);
            }
            setChecking(false);
          }).catch(() => {
            setChecking(false);
          });
        } else {
          setChecking(false);
        }
      }, []);
      
      if (checking) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="spinner" />
          </div>
        );
      }
      
      if (!password) {
        return <LoginScreen onLogin={setPassword} />;
      }
      
      return <SearchScreen password={password} onLogout={() => setPassword(null)} />;
    }
    
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
